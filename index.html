<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panasonic 智能冷氣控制面板</title>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --success-hover: #059669;
            --danger: #ef4444;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { background-color: var(--bg-color); color: var(--text-main); padding: 20px; }
        
        header { max-width: 800px; margin: 0 auto 20px; display: flex; justify-content: space-between; align-items: center; }
        h1 { font-size: 1.5rem; color: var(--text-main); }
        
        .status-badge { padding: 6px 12px; border-radius: 999px; font-size: 0.875rem; font-weight: bold; background: #e5e7eb; color: var(--text-muted); }
        .status-badge.online { background: #d1fae5; color: #065f46; }
        .status-badge.offline { background: #fee2e2; color: #991b1b; }

        .container { max-width: 800px; margin: 0 auto; display: grid; gap: 20px; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
        
        .card { background: var(--card-bg); border-radius: 16px; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); transition: transform 0.2s; }
        .card:hover { transform: translateY(-2px); }
        
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #e5e7eb; padding-bottom: 10px; }
        .card-header h2 { font-size: 1.25rem; }
        
        .power-status { font-weight: bold; padding: 4px 8px; border-radius: 6px; font-size: 0.875rem; }
        .power-on { background: #dbeafe; color: #1e40af; }
        .power-off { background: #f3f4f6; color: #4b5563; }
        .power-offline { background: #fee2e2; color: #991b1b; }

        .temp-display { display: flex; justify-content: space-around; margin-bottom: 24px; text-align: center; }
        .temp-box p { color: var(--text-muted); font-size: 0.875rem; margin-bottom: 4px; }
        .temp-box strong { font-size: 2rem; color: var(--text-main); }

        .actions { display: flex; flex-direction: column; gap: 10px; }
        
        button { padding: 12px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; color: white; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-power { background-color: var(--primary); }
        .btn-power:hover:not(:disabled) { background-color: var(--primary-hover); }
        .btn-quick-cool { background-color: var(--success); display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-quick-cool:hover:not(:disabled) { background-color: var(--success-hover); }
        .btn-quick-cool.active { background-color: #f59e0b; }

        .log { margin-top: 30px; max-width: 800px; margin-left: auto; margin-right: auto; background: #fff; padding: 15px; border-radius: 8px; font-size: 0.85rem; color: #4b5563; height: 150px; overflow-y: auto; line-height: 1.5; }
    </style>
</head>
<body>

    <header>
        <h1>Panasonic 智能控制面板</h1>
        <div id="api-status" class="status-badge">檢查連線中...</div>
    </header>

    <div id="devices-container" class="container">
        <!-- 設備卡片動態產生 -->
    </div>

    <div class="log" id="sys-log">
        <strong>系統紀錄：</strong><br>
    </div>

    <script>
        // 設定 API 網址 (已移除 8080)
        const API_BASE = 'https://panasonic-ac-control-production.up.railway.app';
        let devicesData = [];
        let quickCoolIntervals = {};

        async function init() {
            logMsg("系統初始化中...");
            await checkHealth();
            await fetchDevices();
            setInterval(fetchDevices, 30000);
            restoreTimers();
        }

        function logMsg(msg) {
            const logDiv = document.getElementById('sys-log');
            const time = new Date().toLocaleTimeString('zh-TW');
            logDiv.innerHTML += `[${time}] ${msg}<br>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        async function checkHealth() {
            try {
                const res = await fetch(`${API_BASE}/health`);
                if (res.ok) {
                    document.getElementById('api-status').className = 'status-badge online';
                    document.getElementById('api-status').innerText = 'API 連線正常';
                }
            } catch (error) {
                document.getElementById('api-status').className = 'status-badge offline';
                document.getElementById('api-status').innerText = 'API 連線失敗';
                logMsg("❌ 警告：無法連線至後端 API");
            }
        }

        async function fetchDevices() {
            try {
                const res = await fetch(`${API_BASE}/api/devices`);
                const json = await res.json();
                
                // 相容後端資料結構 {"devices": [...]} 或 [...]
                devicesData = json.devices ? json.devices : json;

                if (!Array.isArray(devicesData) || devicesData.length === 0) {
                    logMsg("⚠️ 找不到任何冷氣設備");
                    return;
                }

                // 首次載入時顯示成功訊息
                if(document.getElementById('devices-container').innerHTML === '') {
                    logMsg(`✅ 成功取得 ${devicesData.length} 台設備資料`);
                }

                devicesData.forEach(device => {
                    const deviceName = device.DeviceName || device.name;
                    const deviceId = device.DeviceID || device.id;
                    const setTemp = device.Settemp;

                    // 規則 A: 溫度小於等於 16 度自動調回 27 度
                    if (setTemp !== undefined && setTemp <= 16) {
                        logMsg(`⚠️ 偵測到 [${deviceName}] 設定為 ${setTemp}度 (≤16)。自動調回 27度！`);
                        controlDevice(deviceId, "4", "27"); 
                        device.Settemp = 27; 
                    }
                });

                renderDevices();
            } catch (error) {
                logMsg(`❌ 讀取設備失敗: ${error.message}`);
            }
        }

        async function controlDevice(deviceId, commandId, value) {
            try {
                logMsg(`發送指令至設備 ${deviceId}: Cmd=${commandId}, Val=${value}`);
                await fetch(`${API_BASE}/api/devices/${deviceId}/control`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ CommandID: commandId, Value: value })
                });
                setTimeout(fetchDevices, 2000); 
            } catch (error) {
                logMsg(`❌ 控制失敗: ${error.message}`);
            }
        }

        function triggerQuickCool(deviceId, deviceName) {
            logMsg(`🚀 啟動 [${deviceName}] 速冷模式 (25度) 20分鐘`);
            controlDevice(deviceId, "4", "25");
            const endTime = Date.now() + (20 * 60 * 1000);
            localStorage.setItem(`qc_${deviceId}`, endTime);
            startCountdown(deviceId, endTime);
        }

        function startCountdown(deviceId, endTime) {
            if (quickCoolIntervals[deviceId]) clearInterval(quickCoolIntervals[deviceId]);

            const btn = document.getElementById(`btn-qc-${deviceId}`);
            if(btn) btn.classList.add('active');

            quickCoolIntervals[deviceId] = setInterval(() => {
                const diff = endTime - Date.now();
                if (diff <= 0) {
                    clearInterval(quickCoolIntervals[deviceId]);
                    localStorage.removeItem(`qc_${deviceId}`);
                    if(btn) {
                        btn.classList.remove('active');
                        btn.innerText = '❄️ 20分鐘速冷 (25°)';
                    }
                    logMsg(`⏱️ [設備 ${deviceId}] 速冷結束，自動調回 27度`);
                    controlDevice(deviceId, "4", "27");
                } else {
                    const mins = Math.floor(diff / 60000);
                    const secs = Math.floor((diff % 60000) / 1000);
                    if(btn) btn.innerText = `⏳ 速冷倒數 ${mins}:${secs.toString().padStart(2, '0')}`;
                }
            }, 1000);
        }

        function restoreTimers() {
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('qc_')) {
                    const deviceId = key.split('_')[1];
                    const endTime = parseInt(localStorage.getItem(key));
                    if (endTime > Date.now()) startCountdown(deviceId, endTime);
                    else localStorage.removeItem(key);
                }
            }
        }

        function togglePower(deviceId, currentStatus) {
            const newVal = (currentStatus === 1 || currentStatus === "1" || currentStatus === true) ? "0" : "1";
            controlDevice(deviceId, "1", newVal);
        }

        function renderDevices() {
            const container = document.getElementById('devices-container');
            container.innerHTML = '';

            devicesData.forEach(device => {
                // 忽略冰箱等非冷氣設備 (device_type === 1 才是冷氣)
                if (device.device_type && device.device_type !== 1) return;

                const deviceId = device.DeviceID || device.id;
                const deviceName = device.DeviceName || device.name;
                const model = device.Model || device.model || '未提供型號';
                const curTemp = device.CurTemp !== undefined ? device.CurTemp : '--';
                const setTemp = device.Settemp !== undefined ? device.Settemp : '--';
                
                // 判斷狀態
                const isOnline = device.is_online !== false;
                const isPowerOn = device.IsEnable === 1 || device.IsEnable === "1" || device.IsEnable === true;
                
                let powerText = isPowerOn ? "運轉中" : "已關機";
                let powerClass = isPowerOn ? "power-on" : "power-off";
                
                if (!isOnline) {
                    powerText = "設備離線";
                    powerClass = "power-offline";
                }

                const isQuickCooling = localStorage.getItem(`qc_${deviceId}`) !== null;
                const qcBtnClass = isQuickCooling ? "btn-quick-cool active" : "btn-quick-cool";
                const qcBtnText = isQuickCooling ? "⏳ 速冷倒數中..." : "❄️ 20分鐘速冷 (25°)";

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-header">
                        <h2>${deviceName} <span style="font-size: 0.8rem; color: #6b7280;">(${model})</span></h2>
                        <span class="power-status ${powerClass}">${powerText}</span>
                    </div>
                    
                    <div class="temp-display">
                        <div class="temp-box">
                            <p>室內目前溫度</p>
                            <strong>${curTemp}°C</strong>
                        </div>
                        <div class="temp-box">
                            <p>冷氣設定溫度</p>
                            <strong>${setTemp}°C</strong>
                        </div>
                    </div>

                    <div class="actions">
                        <button class="btn-power" onclick="togglePower('${deviceId}', ${isPowerOn})" ${!isOnline ? 'disabled' : ''}>
                            ${isPowerOn ? '關閉冷氣' : '開啟冷氣'}
                        </button>
                        <button id="btn-qc-${deviceId}" class="${qcBtnClass}" onclick="triggerQuickCool('${deviceId}', '${deviceName}')" ${!isOnline ? 'disabled' : ''}>
                            ${qcBtnText}
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        window.onload = init;
    </script>
</body>
</html>
